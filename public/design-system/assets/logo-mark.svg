<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Faint connections to secondary (smaller) nodes -->
  <g stroke="var(--brand-border, #dfe2ea)" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="50" x2="85" y2="58"/>
    <line x1="50" y1="50" x2="14" y2="49"/>
  </g>

  <!-- Primary connections to main outer nodes -->
  <g stroke="var(--brand-foreground, #1c2029)" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="50" x2="50" y2="15"/>
    <line x1="50" y1="50" x2="79" y2="28"/>
    <line x1="50" y1="50" x2="74" y2="80"/>
    <line x1="50" y1="50" x2="22" y2="78"/>
  </g>

  <!-- Nodes -->
  <g fill="var(--brand-foreground, #1c2029)">
    <circle cx="50"  cy="50"  r="12"/>   <!-- center -->
    <circle cx="50"  cy="15"  r="7"/>    <!-- top -->
    <circle cx="79"  cy="28"  r="5.5"/>  <!-- top-right -->
    <circle cx="74"  cy="80"  r="7"/>    <!-- bottom-right -->
    <circle cx="22"  cy="78"  r="10"/>   <!-- bottom-left -->
    <circle cx="85"  cy="58"  r="5"/>    <!-- right (secondary) -->
    <circle cx="14"  cy="49"  r="5"/>    <!-- left (secondary) -->
  </g>
</svg>
